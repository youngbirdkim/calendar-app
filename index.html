<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="캘린더 어시스턴트">
<title>캘린더 어시스턴트</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap');

  :root {
    --bg: #f5f4ef;
    --surface: #ffffff;
    --surface2: #eeede8;
    --border: #d8d7d0;
    --accent: #d97757;
    --accent2: #c4623e;
    --text: #1a1a1a;
    --text-muted: #8a8a8a;
    --user-bubble: #1a1a1a;
    --bot-bubble: #ffffff;
    --shadow: rgba(0,0,0,0.06);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  body {
    font-family: 'Noto Sans KR', -apple-system, sans-serif;
    background: var(--bg);
    color: var(--text);
    height: 100dvh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    -webkit-font-smoothing: antialiased;
  }

  /* 헤더 */
  .header {
    padding: 16px 20px 14px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    display: flex; align-items: center; gap: 12px;
    flex-shrink: 0;
  }
  .header-icon {
    width: 36px; height: 36px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    font-size: 20px; flex-shrink: 0;
  }
  .header-info h1 {
    font-size: 18px; font-weight: 700;
    letter-spacing: -0.3px; color: var(--text);
  }
  .header-info p { font-size: 13px; color: var(--text-muted); margin-top: 1px; }
  .status-dot {
    width: 8px; height: 8px;
    background: #22c55e; border-radius: 50%;
    margin-left: auto; flex-shrink: 0;
  }

  /* 대화창 */
  .chat-area {
    flex: 1; overflow-y: auto;
    padding: 12px 12px 8px;
    display: flex; flex-direction: column; gap: 12px;
    scroll-behavior: smooth;
  }
  .chat-area::-webkit-scrollbar { width: 0; }

  .message {
    display: flex; flex-direction: column;
    max-width: 82%;
    animation: fadeUp .2s ease;
  }
  @keyframes fadeUp { from{opacity:0;transform:translateY(5px)} to{opacity:1;transform:translateY(0)} }
  .message.user { align-self: flex-end; align-items: flex-end; }
  .message.bot  { align-self: flex-start; align-items: flex-start; }

  .bubble {
    padding: 10px 14px;
    border-radius: 20px;
    font-size: 17px;
    font-weight: 400;
    line-height: 1.75;
    white-space: pre-wrap;
    word-break: break-word;
    letter-spacing: -0.2px;
  }
  .message.user .bubble {
    background: var(--user-bubble);
    color: #ffffff;
    border-bottom-right-radius: 5px;
  }
  .message.bot .bubble {
    background: var(--bot-bubble);
    border: 1px solid var(--border);
    color: var(--text);
    border-bottom-left-radius: 5px;
    box-shadow: 0 1px 4px var(--shadow);
  }
  .msg-time {
    font-size: 12px; color: var(--text-muted);
    margin-top: 5px;
  }

  /* 로딩 */
  .loading-bubble {
    background: var(--bot-bubble);
    border: 1px solid var(--border);
    border-radius: 20px; border-bottom-left-radius: 5px;
    padding: 16px 20px;
    display: flex; gap: 7px; align-items: center;
    box-shadow: 0 1px 4px var(--shadow);
  }
  .loading-dot {
    width: 9px; height: 9px;
    background: var(--text-muted); border-radius: 50%;
    animation: bounce 1.2s infinite;
  }
  .loading-dot:nth-child(2){animation-delay:.2s}
  .loading-dot:nth-child(3){animation-delay:.4s}
  @keyframes bounce{0%,80%,100%{transform:scale(.55);opacity:.35}40%{transform:scale(1);opacity:1}}

  /* 음성 인식 중 */
  .listening-indicator {
    display: none;
    align-self: flex-end;
    background: rgba(217,119,87,.08);
    border: 1px solid rgba(217,119,87,.3);
    border-radius: 20px; border-bottom-right-radius: 5px;
    padding: 13px 17px;
    font-size: 15px; color: var(--accent);
    max-width: 82%;
  }
  .listening-indicator.active { display: flex; align-items: center; gap: 11px; }
  .listening-wave { display: flex; gap: 4px; align-items: center; }
  .wave-bar { width: 3px; background: var(--accent); border-radius: 2px; animation: wave .8s infinite ease-in-out; }
  .wave-bar:nth-child(1){height:8px;animation-delay:0s}
  .wave-bar:nth-child(2){height:18px;animation-delay:.1s}
  .wave-bar:nth-child(3){height:12px;animation-delay:.2s}
  .wave-bar:nth-child(4){height:20px;animation-delay:.15s}
  .wave-bar:nth-child(5){height:9px;animation-delay:.05s}
  @keyframes wave{0%,100%{transform:scaleY(.5)}50%{transform:scaleY(1)}}

  /* 빈 상태 */
  .empty-state {
    flex: 1;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    gap: 14px; padding: 24px; text-align: center;
  }
  .empty-icon { font-size: 48px; opacity: .25; }
  .empty-state p { font-size: 16px; line-height: 1.75; color: var(--text-muted); }
  .empty-state strong { color: var(--text); font-weight: 500; }
  .empty-hint { font-size: 14px !important; margin-top: 4px; opacity: .7; }

  /* 입력 영역 */
  .input-area {
    padding: 8px 10px 16px;
    background: var(--surface);
    border-top: 1px solid var(--border);
    flex-shrink: 0;
  }

  /* 빠른 버튼 2×3 */
  .quick-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 6px;
    margin-bottom: 8px;
  }
  .quick-btn {
    display: flex; align-items: center; justify-content: center;
    gap: 6px;
    height: 56px;
    border-radius: 14px;
    border: 1px solid var(--border);
    background: var(--surface2);
    color: var(--text);
    font-family: 'Noto Sans KR', sans-serif;
    cursor: pointer;
    transition: all .15s;
  }
  .quick-btn:active {
    background: rgba(217,119,87,.12);
    border-color: var(--accent);
    color: var(--accent);
    transform: scale(.96);
  }
  .q-emoji { font-size: 20px; line-height: 1; flex-shrink: 0; }
  .q-text  { font-size: 16px; font-weight: 500; color: inherit; white-space: nowrap; }

  /* 텍스트 입력 */
  .input-row { display: flex; gap: 10px; align-items: flex-end; }
  .text-input-wrap {
    flex: 1;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 18px;
    display: flex; align-items: flex-end;
    padding: 4px 6px 4px 16px;
    transition: border-color .2s;
  }
  .text-input-wrap:focus-within { border-color: var(--accent); }
  textarea {
    flex: 1; background: none; border: none; outline: none;
    color: var(--text);
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 16px; resize: none;
    padding: 12px 0; max-height: 110px; line-height: 1.5;
  }
  textarea::placeholder { color: var(--text-muted); }
  .send-btn {
    width: 48px; height: 48px;
    border-radius: 50%; border: none;
    background: var(--user-bubble);
    color: white; font-size: 20px; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0; transition: transform .1s; margin-bottom: 2px;
  }
  .send-btn:active { transform: scale(.92); }

  /* 마이크 128px */
  .mic-wrap {
    display: flex; flex-direction: column;
    align-items: center;
    margin-top: 8px; gap: 4px;
  }
  .mic-btn {
    width: 72px; height: 72px;
    border-radius: 50%; border: none;
    background: var(--user-bubble);
    color: white; font-size: 28px; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: all .2s;
    box-shadow: 0 4px 16px rgba(0,0,0,0.15);
  }
  .mic-btn:active { transform: scale(.92); }
  .mic-btn.listening {
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    box-shadow: 0 4px 20px rgba(217,119,87,.35);
    animation: mic-pulse 1.5s infinite;
  }
  @keyframes mic-pulse {
    0%,100%{box-shadow:0 4px 20px rgba(217,119,87,.35)}
    50%{box-shadow:0 4px 32px rgba(217,119,87,.15)}
  }
  .mic-label { font-size: 13px; color: var(--text-muted); font-weight: 400; }

  /* TTS */
  .tts-bar {
    display: none; align-items: center; justify-content: center;
    gap: 10px; padding: 7px 0 0;
    font-size: 13px; color: var(--text-muted);
  }
  .tts-bar.active { display: flex; }
  .stop-btn {
    background: none; border: 1px solid var(--border);
    border-radius: 9px; color: var(--text-muted);
    font-size: 13px; padding: 5px 14px; cursor: pointer;
    font-family: 'Noto Sans KR', sans-serif;
  }

  /* 토스트 */
  .toast {
    position: fixed; top: 78px;
    left: 50%; transform: translateX(-50%) translateY(-10px);
    background: #fff0ed;
    border: 1px solid #ffb8a0;
    color: #c4623e; border-radius: 12px;
    padding: 10px 20px; font-size: 14px;
    opacity: 0; transition: all .3s;
    pointer-events: none; white-space: nowrap; z-index: 200;
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
</style>
</head>
<body>

<div class="header">
  <div class="header-icon">📅</div>
  <div class="header-info">
    <h1>캘린더 어시스턴트</h1>
    <p>TCC STEEL · 음성/텍스트 지원</p>
  </div>
  <div class="status-dot"></div>
</div>

<div class="chat-area" id="chatArea">
  <div class="empty-state" id="emptyState">
    <div class="empty-icon">🎙️</div>
    <p><strong>아래 마이크 버튼</strong>을 누르고<br>말씀하거나 텍스트로 입력하세요</p>
    <p class="empty-hint">"오늘 일정 보여줘"<br>"내일 오후 2시에 팀미팅 잡아줘"</p>
  </div>
  <div class="listening-indicator" id="listeningIndicator">
    <div class="listening-wave">
      <div class="wave-bar"></div><div class="wave-bar"></div>
      <div class="wave-bar"></div><div class="wave-bar"></div>
      <div class="wave-bar"></div>
    </div>
    <span id="listeningText">듣고 있어요...</span>
  </div>
</div>

<div class="toast" id="toast"></div>

<div class="input-area">
  <div class="quick-grid">
    <button class="quick-btn" onclick="sendQuick('오늘 일정 보여줘')">
      <span class="q-emoji">📅</span><span class="q-text">오늘</span>
    </button>
    <button class="quick-btn" onclick="sendQuick('내일 일정 보여줘')">
      <span class="q-emoji">📅</span><span class="q-text">내일</span>
    </button>
    <button class="quick-btn" onclick="sendQuick('이번주 일정 보여줘')">
      <span class="q-emoji">📆</span><span class="q-text">이번주</span>
    </button>
    <button class="quick-btn" onclick="sendQuick('예')">
      <span class="q-emoji">✅</span><span class="q-text">예</span>
    </button>
    <button class="quick-btn" onclick="sendQuick('아니오')">
      <span class="q-emoji">❎</span><span class="q-text">아니오</span>
    </button>
    <button class="quick-btn" onclick="sendQuick('취소')">
      <span class="q-emoji">❌</span><span class="q-text">취소</span>
    </button>
    <button class="quick-btn" onclick="sendQuick('일정 조회해줘')">
      <span class="q-emoji">🔍</span><span class="q-text">조회</span>
    </button>
    <button class="quick-btn" onclick="sendQuick('일정 생성해줘')">
      <span class="q-emoji">➕</span><span class="q-text">생성</span>
    </button>
    <button class="quick-btn" onclick="sendQuick('일정 수정해줘')">
      <span class="q-emoji">✏️</span><span class="q-text">수정</span>
    </button>
  </div>

  <div class="input-row">
    <div class="text-input-wrap">
      <textarea id="textInput" placeholder="메시지 입력..." rows="1"
        onkeydown="handleKeyDown(event)" oninput="autoResize(this)"></textarea>
      <button class="send-btn" onclick="sendText()">↑</button>
    </div>
  </div>

  <div class="mic-wrap">
    <button class="mic-btn" id="micBtn" onclick="toggleMic()">🎙️</button>
    <div class="mic-label" id="micLabel">탭하여 말하기</div>
  </div>

  <div class="tts-bar" id="ttsBar">
    <span>🔊 응답 읽는 중...</span>
    <button class="stop-btn" onclick="stopTTS()">중지</button>
  </div>
</div>

<script>
const BASE_URL = '여기에_웹앱_URL을_입력하세요'; // ⚠️ STEP 5에서 복사한 웹앱 URL로 교체
const USER_EMAIL = '여기에_본인이메일을_입력하세요'; // ⚠️ 본인 회사 이메일로 교체 (예: hong@tccsteel.com)

let recognition = null;
let isListening = false;
let isSpeaking = false;
let isLoading = false;
let loadingEl = null;

window.addEventListener('load', () => {
  initSpeechRecognition();
  autoResize(document.getElementById('textInput'));
});

function initSpeechRecognition() {
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SR) {
    document.getElementById('micBtn').disabled = true;
    document.getElementById('micLabel').textContent = '음성 미지원 브라우저';
    return;
  }
  recognition = new SR();
  recognition.lang = 'ko-KR';
  recognition.continuous = false;
  recognition.interimResults = true;

  recognition.onstart = () => {
    isListening = true;
    document.getElementById('micBtn').classList.add('listening');
    document.getElementById('micBtn').textContent = '⏹';
    document.getElementById('micLabel').textContent = '듣는 중 · 탭하면 중지';
    document.getElementById('listeningIndicator').classList.add('active');
    document.getElementById('emptyState')?.remove();
  };
  recognition.onresult = (e) => {
    const transcript = Array.from(e.results).map(r => r[0].transcript).join('');
    document.getElementById('listeningText').textContent = transcript || '듣고 있어요...';
    if (e.results[e.results.length - 1].isFinal) {
      stopListening();
      if (transcript.trim()) sendMessage(transcript.trim());
    }
  };
  recognition.onerror = (e) => {
    stopListening();
    if (e.error !== 'aborted') showToast('음성 인식 오류: ' + e.error);
  };
  recognition.onend = () => { stopListening(); };
}

function toggleMic() {
  if (isSpeaking) { stopTTS(); return; }
  if (isListening) { stopListening(); return; }
  if (isLoading) return;
  startListening();
}
function startListening() {
  if (!recognition) { showToast('음성 인식이 지원되지 않습니다'); return; }
  try { recognition.start(); } catch(e) { showToast('마이크 접근 오류'); }
}
function stopListening() {
  isListening = false;
  document.getElementById('micBtn').classList.remove('listening');
  document.getElementById('micBtn').textContent = '🎙️';
  document.getElementById('micLabel').textContent = '탭하여 말하기';
  document.getElementById('listeningIndicator').classList.remove('active');
  document.getElementById('listeningText').textContent = '듣고 있어요...';
  try { recognition?.stop(); } catch(e) {}
}

function speak(text) {
  if (!window.speechSynthesis) return;
  stopTTS();
  const clean = text
    .replace(/[\u{1F300}-\u{1FFFF}]/gu, '')
    .replace(/\*([^*]+)\*/g, '$1')
    .replace(/📌|📅|🏢|👥|🕐|📍|✅|🗑️|⚠️|🔍|📋|🌅|🌆/g, '')
    .replace(/\s+/g, ' ').trim();
  const utter = new SpeechSynthesisUtterance(clean);
  utter.lang = 'ko-KR'; utter.rate = 1.05;
  const voices = speechSynthesis.getVoices();
  const koVoice = voices.find(v => v.lang.includes('ko'));
  if (koVoice) utter.voice = koVoice;
  utter.onstart = () => { isSpeaking = true; document.getElementById('ttsBar').classList.add('active'); };
  utter.onend = utter.onerror = () => { isSpeaking = false; document.getElementById('ttsBar').classList.remove('active'); };
  speechSynthesis.speak(utter);
}
function stopTTS() {
  window.speechSynthesis?.cancel();
  isSpeaking = false;
  document.getElementById('ttsBar').classList.remove('active');
}

function callAPI(message) {
  return new Promise((resolve, reject) => {
    const cbName = 'cb_' + Date.now();
    const script = document.createElement('script');
    const params = new URLSearchParams({
      message: message,
      userEmail: USER_EMAIL,
      callback: cbName
    });
    const timer = setTimeout(() => {
      cleanup();
      reject(new Error('응답 시간 초과'));
    }, 20000);
    function cleanup() {
      clearTimeout(timer);
      delete window[cbName];
      if (script.parentNode) script.parentNode.removeChild(script);
    }
    window[cbName] = (data) => { cleanup(); resolve(data); };
    script.onerror = () => { cleanup(); reject(new Error('네트워크 오류')); };
    script.src = BASE_URL + '?' + params.toString();
    document.head.appendChild(script);
  });
}

async function sendMessage(text) {
  if (!text.trim() || isLoading) return;
  document.getElementById('emptyState')?.remove();
  appendMessage('user', text);
  isLoading = true;
  loadingEl = appendLoading();
  try {
    const data = await callAPI(text);
    const reply = data.reply || '응답을 받지 못했습니다.';
    removeLoading();
    appendMessage('bot', reply);
    speak(reply);
  } catch(err) {
    removeLoading();
    appendMessage('bot', '연결 오류: ' + err.message);
    showToast('연결 실패');
  } finally {
    isLoading = false;
  }
}

function sendText() {
  const input = document.getElementById('textInput');
  const text = input.value.trim();
  if (!text) return;
  input.value = ''; autoResize(input); stopTTS(); sendMessage(text);
}
function sendQuick(text) { stopTTS(); sendMessage(text); }
function handleKeyDown(e) {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendText(); }
}

function appendMessage(role, text) {
  const chatArea = document.getElementById('chatArea');
  const listeningEl = document.getElementById('listeningIndicator');
  const div = document.createElement('div');
  div.className = `message ${role}`;
  const now = new Date();
  const time = now.getHours().toString().padStart(2,'0') + ':' + now.getMinutes().toString().padStart(2,'0');
  div.innerHTML = `<div class="bubble">${escapeHtml(text)}</div><div class="msg-time">${time}</div>`;
  chatArea.insertBefore(div, listeningEl);
  scrollToBottom();
}
function appendLoading() {
  const chatArea = document.getElementById('chatArea');
  const listeningEl = document.getElementById('listeningIndicator');
  const div = document.createElement('div');
  div.className = 'message bot';
  div.innerHTML = `<div class="loading-bubble"><div class="loading-dot"></div><div class="loading-dot"></div><div class="loading-dot"></div></div>`;
  chatArea.insertBefore(div, listeningEl);
  scrollToBottom();
  return div;
}
function removeLoading() { loadingEl?.remove(); loadingEl = null; }
function scrollToBottom() {
  const chatArea = document.getElementById('chatArea');
  setTimeout(() => { chatArea.scrollTop = chatArea.scrollHeight; }, 50);
}
function escapeHtml(text) {
  return text.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;').replace(/\n/g,'<br>');
}
function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 110) + 'px';
}
function showToast(msg) {
  const toast = document.getElementById('toast');
  toast.textContent = msg;
  toast.classList.add('show');
  setTimeout(() => toast.classList.remove('show'), 3000);
}
window.speechSynthesis?.addEventListener('voiceschanged', () => {});
</script>
</body>
</html>
